<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Лабораторна №4 – JavaScript</title>
  <link rel="stylesheet" href="styles4.css">
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Лабораторна робота №4</h1>
    <button id="toggleTheme"> Нічний режим</button>
  </header>

  <main>

    <!-- Comments -->
    <section id="commentsSection">
      <h2>Коментарі (варіант 22)</h2>
      <div id="commentsList">Завантаження...</div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <h3>Інформація про браузер та ОС (з localStorage)</h3>
    <div class="info-grid" id="footerInfo"></div>
  </footer>

  <!-- Modal -->
  <div id="modalOverlay">
    <div id="modal">

      <button id="closeModal">×</button>

      <h2>Зворотній зв'язок</h2>

      <form id="contactForm"
            action="https://formspree.io/f/mpqnkpkw"
            method="POST">

        <div class="form-group">
          <label for="fname">Ім'я</label>
          <input type="text"
                 id="fname"
                 name="name"
                 placeholder="Ваше ім'я"
                 required />
        </div>

        <div class="form-group">
          <label for="femail">Email</label>
          <input type="email"
                 id="femail"
                 name="email"
                 placeholder="example@mail.com"
                 required />
        </div>

        <div class="form-group">
          <label for="fphone">Номер телефону</label>
          <input type="tel"
                 id="fphone"
                 name="phone"
                 placeholder="+380..." />
        </div>

        <div class="form-group">
          <label for="fmessage">Повідомлення</label>
          <textarea id="fmessage"
                    name="message"
                    placeholder="Ваш текст..."></textarea>
        </div>

        <button type="submit" id="sendBtn">
          Відправити
        </button>

        <p id="formMsg"></p>

      </form>

    </div>
  </div>

<script>

    // LocalStorage

    const browserInfo = {
      'userAgent': navigator.userAgent,
      'платформа': navigator.platform,
      'мова': navigator.language,
      'мови': navigator.languages.join(', '),
      'кукі увімкнені': navigator.cookieEnabled ? 'так' : 'ні',
      'онлайн': navigator.onLine ? 'так' : 'ні',
      'ядер CPU': navigator.hardwareConcurrency ?? 'невідомо',
      'пам\'ять (GB)': navigator.deviceMemory ?? 'невідомо',
      'ширина екрану': screen.width + 'px',
      'висота екрану': screen.height + 'px',
      'глибина кольору': screen.colorDepth + ' біт',
      'часовий пояс': Intl.DateTimeFormat().resolvedOptions().timeZone,
      'дата збереження': new Date().toLocaleString('uk-UA'),
    };

    for (const [key, value] of Object.entries(browserInfo)) {
      localStorage.setItem(key, value);
    }

    const footerGrid = document.getElementById('footerInfo');

    for (let i = 0; i < localStorage.length; i++) {

      const key = localStorage.key(i);
      const val = localStorage.getItem(key);

      const row = document.createElement('div');

      row.className = 'info-row';

      row.innerHTML = `
        <span class="info-key">${key}:</span>
        <span>${val}</span>
      `;

      footerGrid.appendChild(row);
    }


    // Comments API

    async function loadComments() {

      const container =
        document.getElementById('commentsList');

      try {

        const res = await fetch(
          'https://jsonplaceholder.typicode.com/posts/22/comments'
        );

        if (!res.ok) {
          throw new Error('Сервер: ' + res.status);
        }

        const comments = await res.json();

        container.innerHTML = '';

        comments.forEach(comment => {

          const card = document.createElement('div');

          card.className = 'comment-card';

          card.innerHTML = `
            <div class="c-name">${comment.name}</div>
            <div class="c-email">${comment.email}</div>
            <div class="c-body">${comment.body}</div>
          `;

          container.appendChild(card);
        });

      } catch (err) {

        container.innerHTML = `
          <p id="commentsError">
            Не вдалося завантажити коментарі:
            ${err.message}
          </p>
        `;
      }
    }

    loadComments();


    // Modal

    const overlay =
      document.getElementById('modalOverlay');

    const closeBtn =
      document.getElementById('closeModal');

    const form =
      document.getElementById('contactForm');

    const formMsg =
      document.getElementById('formMsg');


    setTimeout(() => {
      overlay.classList.add('active');
    }, 60000);


    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
    });


    overlay.addEventListener('click', (e) => {

      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });


    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      const data = new FormData(form);

      try {

        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: {
            'Accept': 'application/json'
          }
        });

        if (res.ok) {

          formMsg.textContent =
            'Повідомлення надіслано!';

          form.reset();

          setTimeout(() => {
            overlay.classList.remove('active');
          }, 2000);

        } else {

          const errorData = await res.json();

          formMsg.style.color = '#e57373';

          formMsg.textContent =
            errorData.error || 'Помилка відправки.';
        }

      } catch {

        formMsg.style.color = '#e57373';

        formMsg.textContent =
          'Помилка мережі.';
      }
    });


    // Theme

    const toggleBtn =
      document.getElementById('toggleTheme');


    function isDaytime() {

      const hour = new Date().getHours();

      return hour >= 7 && hour < 21;
    }


    function applyTheme(night) {

      if (night) {

        document.body.classList.add('night');

        toggleBtn.textContent =
          ' Денний режим';

      } else {

        document.body.classList.remove('night');

        toggleBtn.textContent =
          ' Нічний режим';
      }
    }


    applyTheme(!isDaytime());


    toggleBtn.addEventListener('click', () => {

      const isNight =
        document.body.classList.contains('night');

      applyTheme(!isNight);
    });


    setInterval(() => {
      applyTheme(!isDaytime());
    }, 5 * 60 * 1000);

  </script>

</body>
</html>
